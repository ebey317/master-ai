<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sensei Options</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="settings">
    <header>
      <h1>Sensei Options</h1>
      <p id="status">Not saved</p>
    </header>

    <form id="optionsForm">
      <label>
        Backend URL
        <input id="backendUrl" type="url" placeholder="http://127.0.0.1:8080">
      </label>

      <label>
        Master AI Token
        <input id="token" type="password" autocomplete="off">
      </label>

      <label>
        Default Mode
        <select id="mode">
          <option value="review">Ask before acting</option>
          <option value="plan">Plan only</option>
          <option value="auto">Act without asking</option>
        </select>
      </label>

      <label>
        Session ID
        <input id="sessionId" type="text" autocomplete="off">
      </label>

      <label>
        Résumé file path
        <input id="resumePath" type="text" placeholder="/home/elijah/Documents/resume.pdf" autocomplete="off">
        <button id="testResumeRead" type="button">Test read</button>
        <small>Local file the model can reference for file-upload BROWSER_FILL targets. Backend reads via the /extension/read_local_file endpoint (auth required).</small>
      </label>

      <section class="permissions">
        <div>
          <h2>Browser Permissions</h2>
          <p>Act without asking mode runs non-protected browser actions without per-action approval. The always-confirm list (purchases, deletions, auth, sensitive fields) still pauses for explicit OK.</p>
        </div>

        <label>
          Action Permission Mode
          <select id="actionPermissionMode">
            <option value="ask">Ask Before Acting</option>
            <option value="act">Act Without Asking</option>
          </select>
        </label>

        <div class="site-head">
          <span>Approved Sites</span>
          <button id="clearApprovedSites" type="button">Clear</button>
        </div>
        <ul id="approvedSites" class="site-list"></ul>
      </section>

      <div class="actions">
        <button id="generateToken" type="button">Generate Token</button>
        <button id="testBackend" type="button">Test</button>
        <button type="submit">Save</button>
      </div>
    </form>
  </main>
  <script src="options.js"></script>
</body>
</html>
