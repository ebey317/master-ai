<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sensei Loop Smoke</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --panel: #ffffff;
      --ink: #1c2220;
      --muted: #66706a;
      --line: #dce2dc;
      --accent: #0f766e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 16px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(680px, calc(100vw - 32px));
      margin: 48px auto;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: 24px;
      letter-spacing: 0;
    }

    .intro {
      margin-top: 8px;
      color: var(--muted);
    }

    .controls {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    input,
    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
    }

    input {
      padding: 0 12px;
      color: var(--ink);
      background: white;
    }

    button {
      width: fit-content;
      padding: 0 16px;
      border-color: var(--accent);
      background: var(--accent);
      color: white;
      cursor: pointer;
    }

    a {
      width: fit-content;
      color: var(--accent);
      font-weight: 650;
    }

    #result {
      min-height: 28px;
      margin-top: 18px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
    }
  </style>
</head>
<body>
  <main>
    <h1>Sensei Loop Smoke</h1>
    <p class="intro">Use this page to verify Auto mode can fill a field, click a button, report results, and continue.</p>

    <section class="controls" aria-label="Loop smoke controls">
      <label for="nameField">
        Name field
        <input id="nameField" name="name" type="text" autocomplete="off" aria-label="Name field">
      </label>

      <button id="submitButton" type="button" aria-label="Submit button">Submit</button>

      <a id="docsLink" href="https://example.com/" aria-label="Example link">Example link</a>
    </section>

    <p id="result" role="status" aria-live="polite">Not submitted yet.</p>
  </main>

  <script>
    const nameField = document.querySelector("#nameField");
    const submitButton = document.querySelector("#submitButton");
    const result = document.querySelector("#result");

    window.__senseiLoopSmoke = {
      submitted: false,
      name: "",
      clicks: 0
    };

    submitButton.addEventListener("click", () => {
      window.__senseiLoopSmoke.submitted = true;
      window.__senseiLoopSmoke.name = nameField.value;
      window.__senseiLoopSmoke.clicks += 1;
      result.textContent = `Submitted name: ${nameField.value || "(empty)"}`;
      console.log("[Sensei loop smoke] submit clicked", JSON.stringify(window.__senseiLoopSmoke));
    });
  </script>
</body>
</html>
