<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sensei</title>
  <link rel="stylesheet" href="side_panel.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>Sensei</h1>
        <p id="connectionState">Checking backend</p>
      </div>
      <button id="openOptions" class="icon-button" title="Options" aria-label="Options">...</button>
    </header>

    <section id="chatLog" class="chat-log" aria-live="polite"></section>

    <section id="actionDock" class="action-dock" hidden>
      <div class="dock-head">
        <h2>Actions</h2>
        <button id="clearActions" class="text-button">Clear</button>
      </div>
      <div id="actionList" class="action-list"></div>
    </section>

    <section id="loopBar" class="loop-bar" hidden>
      <span id="roundCounter" class="round-counter"></span>
      <button id="stopButton" class="stop-button" type="button">Stop</button>
    </section>

    <form id="composer" class="composer">
      <div class="mode-row">
        <select id="modeSelect" aria-label="Mode">
          <option value="review">Ask before acting</option>
          <option value="plan">Plan only</option>
          <option value="auto">Act without asking</option>
          <option value="quick">Quick mode (single-letter commands)</option>
        </select>
        <span id="routeMeta" class="route-meta"></span>
      </div>
      <textarea id="promptInput" rows="3" placeholder="Ask Sensei"></textarea>
      <div class="composer-actions">
        <button id="recordButton" class="secondary" type="button">Record</button>
        <button id="micButton" class="secondary" type="button">Mic</button>
        <button id="sendButton" type="submit">Send</button>
      </div>
    </form>

    <section id="shortcutDock" class="shortcut-dock" hidden>
      <div class="dock-head">
        <h2>Shortcuts</h2>
        <button id="refreshShortcuts" class="text-button" type="button">Refresh</button>
      </div>
      <div id="shortcutList" class="shortcut-list"></div>
    </section>

    <dialog id="scheduleDialog" class="schedule-dialog">
      <form method="dialog" id="scheduleForm">
        <h2>Schedule</h2>
        <label>
          Cadence
          <select id="scheduleCadence">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="annual">Annual</option>
          </select>
        </label>
        <label>
          Time
          <input id="scheduleTime" type="time" value="09:00">
        </label>
        <div class="action-buttons">
          <button id="cancelSchedule" class="secondary" value="cancel" type="button">Cancel</button>
          <button class="primary" value="default" type="submit">Save</button>
        </div>
      </form>
    </dialog>
  </main>
  <script src="side_panel.js"></script>
</body>
</html>
